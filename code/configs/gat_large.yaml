name: "gat_large"
description: "Scaled up GAT encoder - more layers, wider dimensions"

gat:
  num_joint_types: 17
  joint_embedding_dim: 64
  raw_feature_dim: 4
  hidden_dim: 256
  output_dim: 256
  num_layers: 4
  num_heads: 8
  dropout: 0.1
  use_layer_norm: true
  l2_normalize: true

detr:
  embedding_dim: 256
  max_people: 10
  num_decoder_layers: 4
  num_heads: 8
  ffn_dim: 1024
  dropout: 0.1
  num_joint_types: 17

loss:
  lambda_existence: 1.0
  lambda_assignment: 5.0
  lambda_contrastive: 2.0
  contrastive_margin: 0.5
  label_smoothing: 0.0

trainer:
  mode: "full"
  learning_rate: 5.0e-5
  weight_decay: 0.01
  max_grad_norm: 1.0
  warmup_epochs: 10
  min_lr: 1.0e-6
  epochs: 100
  batch_size: 32
  print_every_n_epochs: 5
  visualize_every_n_epochs: 20
  checkpoint_every_n_epochs: 25
  compute_clustering_metrics: true

data:
  split: "mixed"
  test_split: "mixed_test"
  image_size: 512
  k_neighbors: 8
  min_visibility: 1
  num_workers: 4
  shuffle: true

eval:
  existence_threshold: 0.5
  save_visualizations: true
  max_visualizations: 50
  compute_per_joint_metrics: true