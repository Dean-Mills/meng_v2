name: "dec_isolation"
description: "DEC isolation testing — verify cluster assignments are correct given GAT embeddings"

gat:
  num_joint_types: 17
  joint_embedding_dim: 32
  raw_feature_dim: 4
  hidden_dim: 64
  output_dim: 128
  num_layers: 2
  num_heads: 4
  dropout: 0.1
  use_layer_norm: true
  l2_normalize: true

dec:
  n_clusters:      5      # K — overridden per scene at runtime using ground truth person count
  alpha:           1.0    # Student's t-distribution degrees of freedom
  update_interval: 20    # steps between target distribution refreshes

loss:
  contrastive_margin: 0.5
  dec_weight: 1.0