name: "finetune_scot_coco"
description: "Fine-tune Standard GAT + SCOT on COCO train2017, starting from synthetic pre-trained weights"

gat:
  num_joint_types: 17
  joint_embedding_dim: 32
  raw_feature_dim: 4
  hidden_dim: 64
  output_dim: 128
  num_layers: 2
  num_heads: 4
  dropout: 0.1
  use_layer_norm: true
  l2_normalize: true
  use_depth: false

scot:
  hidden_dim: 256
  k_max: 10
  sinkhorn_iters: 10
  sinkhorn_tau: 0.1

loss:
  contrastive_margin: 0.5
  scot_weight: 1.0

training:
  virtual_dir:      data/virtual
  coco_train_dir:   data/coco2017/train2017
  coco_train_ann:   data/coco2017/annotations/person_keypoints_train2017.json
  pretrained:       outputs/frozen_checkpoints/scot_no_depth/best.pt
  batch_size:       4
  num_workers:      4
  lr:               1e-4
  lr_min:           1e-6
  weight_decay:     1e-4
  epochs:           20
  val_every:        2
  save_best:        true
