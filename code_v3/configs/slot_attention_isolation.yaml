name: "slot_attention_isolation"
description: "Slot attention isolation testing — verify grouping works on GAT embeddings"

gat:
  num_joint_types: 17
  joint_embedding_dim: 32
  raw_feature_dim: 4
  hidden_dim: 64
  output_dim: 128
  num_layers: 2
  num_heads: 4
  dropout: 0.1
  use_layer_norm: true
  l2_normalize: true

slot_attention:
  num_iterations: 7
  slot_weight:    1.0

loss:
  contrastive_margin: 0.5
  slot_weight:        1.0