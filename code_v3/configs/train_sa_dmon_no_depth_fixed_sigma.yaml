name: "train_sa_dmon_no_depth_fixed_sigma"
description: "SA-DMoN no depth, sigma = median pairwise distance per graph (not learned), lambda_spectral 0.1"

gat:
  num_joint_types: 17
  joint_embedding_dim: 32
  raw_feature_dim: 4
  hidden_dim: 64
  output_dim: 128
  num_layers: 2
  num_heads: 4
  dropout: 0.1
  use_layer_norm: true
  l2_normalize: true
  use_depth: false

sa_dmon:
  hidden_dim: 256
  k_max: 10
  dropout: 0.0
  lambda_spectral: 0.1
  lambda_ortho: 0.1
  lambda_cluster: 0.1
  lambda_type: 1.0
  lambda_supervised: 1.0

loss:
  contrastive_margin: 0.5
  sa_dmon_weight: 1.0

training:
  virtual_dir:   data/virtual
  batch_size:    4
  num_workers:   4
  lr:            1e-3
  lr_min:        1e-5
  weight_decay:  1e-4
  epochs:        100
  val_every:     5
  save_dir:      outputs/checkpoints/sa_dmon_no_depth_fixed_sigma
  save_best:     true
