name: "finetune_sa_gat_coco"
description: "Fine-tune SA-GAT (full) on COCO train2017, starting from synthetic pre-trained weights"

sa_gat:
  num_joint_types: 17
  joint_embedding_dim: 32
  raw_feature_dim: 4
  hidden_dim: 64
  output_dim: 128
  num_layers: 2
  num_heads: 4
  dropout: 0.1
  use_layer_norm: true
  l2_normalize: true
  use_depth: false
  # SA-GAT specific
  type_pair_dim: 16
  pos_encoding_dim: 16
  num_repulsion_heads: 1

gat:
  num_joint_types: 17
  joint_embedding_dim: 32
  raw_feature_dim: 4
  hidden_dim: 64
  output_dim: 128
  num_layers: 2
  num_heads: 4
  dropout: 0.1
  use_layer_norm: true
  l2_normalize: true
  use_depth: false

loss:
  contrastive_margin: 0.5

training:
  virtual_dir:      data/virtual
  coco_train_dir:   data/coco2017/train2017
  coco_train_ann:   data/coco2017/annotations/person_keypoints_train2017.json
  pretrained:       outputs/frozen_checkpoints/sa_gat_full/best.pt
  batch_size:       4
  num_workers:      4
  lr:               1e-4
  lr_min:           1e-6
  weight_decay:     1e-4
  epochs:           20
  val_every:        2
  save_best:        true
